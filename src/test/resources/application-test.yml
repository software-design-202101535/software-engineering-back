spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edumanager_test?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        generate_statistics: true
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-1234567890
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000
